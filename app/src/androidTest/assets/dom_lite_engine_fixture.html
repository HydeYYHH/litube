<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DomLiteEngine Fixture</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 16px;
        }

        #card-list {
            display: grid;
            gap: 8px;
        }

        .safe-card {
            background: #f3f3f3;
            border-radius: 12px;
            min-height: 48px;
            padding: 12px;
        }
    </style>
</head>
<body>
<main>
    <div id="card-list"></div>
</main>
<script>
    (() => {
        const root = document.getElementById('card-list');
        let nextId = 0;

        window.appendCards = (count) => {
            for (let i = 0; i < count; i += 1) {
                const card = document.createElement('div');
                card.className = 'safe-card';
                card.dataset.cardId = String(nextId);
                card.textContent = `card-${nextId}`;
                nextId += 1;
                root.appendChild(card);
            }
            return root.children.length;
        };

        window.reorderCards = () => {
            if (root.children.length < 2) return false;
            root.insertBefore(root.lastElementChild, root.firstElementChild);
            return true;
        };

        window.removeCard = (id) => {
            const card = document.querySelector(`[data-card-id="${id}"]`);
            if (!card) return false;
            card.remove();
            return true;
        };

        window.countCards = () => root.children.length;

        window.cardOrder = () => [...root.children].map(card => card.dataset.cardId);

        window.setVirtualPath = (path) => {
            history.replaceState({}, '', path);
            return location.pathname + location.search;
        };

        window.readDebug = () => {
            const api = window.__liteDomDebug;
            return {
                available: Boolean(api && typeof api.getSnapshot === 'function'),
                snapshot: api && typeof api.getSnapshot === 'function'
                    ? api.getSnapshot()
                    : null
            };
        };
    })();
</script>
</body>
</html>
